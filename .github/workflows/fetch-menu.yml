name: Fetch menu data

on:
  workflow_dispatch:
  schedule:
    # Weekdays, every hour from 04:00 to 23:00 UTC
    - cron: "0 4-23 * * 1-5"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Decide target month/year
        id: target
        run: |
          set -euo pipefail
          current_month="$(date -u +%m)"
          current_year="$(date -u +%Y)"

          tomorrow_weekday="$(date -u -d "tomorrow" +%u)"
          tomorrow_month="$(date -u -d "tomorrow" +%m)"

          use_next="false"

          # If tomorrow is a weekday and in the next month, switch to next month.
          if [[ "$tomorrow_weekday" -ge 1 && "$tomorrow_weekday" -le 5 && "$tomorrow_month" != "$current_month" ]]; then
            use_next="true"
          fi

          # If it's Friday after 16:00 UTC and the next Monday is in the next month,
          # prefetch next month before the weekend.
          weekday="$(date -u +%u)"
          hour="$(date -u +%H)"
          next_monday_month="$(date -u -d "next monday" +%m)"
          if [[ "$weekday" -eq 5 && "$hour" -ge 16 && "$next_monday_month" != "$current_month" ]]; then
            use_next="true"
          fi

          target_month="$current_month"
          target_year="$current_year"
          if [[ "$use_next" == "true" ]]; then
            next_month_date="$(date -u -d "$(date -u +%Y-%m-01) +1 month" +%Y-%m-01)"
            target_month="$(date -u -d "$next_month_date" +%m)"
            target_year="$(date -u -d "$next_month_date" +%Y)"
          fi

          # Strip leading zero for numeric month argument
          target_month=$((10#$target_month))

          echo "year=$target_year" >> "$GITHUB_OUTPUT"
          echo "month=$target_month" >> "$GITHUB_OUTPUT"
          echo "use_next=$use_next" >> "$GITHUB_OUTPUT"

      - name: Run fetch script
        run: |
          echo "Using month=${{ steps.target.outputs.month }} year=${{ steps.target.outputs.year }} (use_next=${{ steps.target.outputs.use_next }})"
          python fetch_menu.py --year "${{ steps.target.outputs.year }}" --month "${{ steps.target.outputs.month }}" --output-dir data

      - name: Commit and push if needed
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes."
            exit 0
          fi

          mapfile -t files < <(git status --porcelain | awk '{print $2}')
          if [[ "${#files[@]}" -eq 1 ]] && { [[ "${files[0]}" == "data/metadata.json" ]] || [[ "${files[0]}" == "metadata.json" ]]; }; then
            echo "Only metadata.json changed, skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "json auto refresh from git workflow - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
